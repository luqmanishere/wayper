default_profile = "slide-lr"
# Global settings
transitions_enabled = true

# Global fallback transition config
[transition]
type = "crossfade"
duration_ms = 2000
fps = 60

# Profile 1: Basic crossfade
[crossfade.eDP-1]
duration = 10
path = "samples/wallpapers/waifu"
fit = "cover"

[crossfade.eDP-1.transition]
type = "crossfade"
duration_ms = 2000
fps = 60

# Profile 2: Left-to-right slide
[slide-lr.eDP-1]
duration = 10
path = "samples/wallpapers/waifu"
fit = "cover"

[slide-lr.eDP-1.transition]
type = "slide"
duration_ms = 3000
fps = 60

[slide-lr.eDP-1.transition.slide]
direction = "left-to-right"

# Profile 3: Diagonal slide
[slide-diagonal.eDP-1]
duration = 10
path = "samples/wallpapers/waifu"

[slide-diagonal.eDP-1.transition]
type = "slide"
duration_ms = 2000
fps = 60

[slide-diagonal.eDP-1.transition.slide]
direction = "top-left-to-bottom-right"

# Profile 4: Random transitions
[random.eDP-1]
duration = 10
path = "samples/wallpapers/waifu"

[random.eDP-1.transition]
type = ["crossfade", "slide"]
duration_ms = 1500
fps = 60

[random.eDP-1.transition.slide]
direction = "right-to-left"

# Profile 5: Fast slide
[fast.eDP-1]
duration = 5
path = "samples/wallpapers/waifu"

[fast.eDP-1.transition]
type = "slide"
duration_ms = 500
fps = 60

[fast.eDP-1.transition.slide]
direction = "bottom-to-top"

# Profile 6: Slow cinematic
[slow.eDP-1]
duration = 30
path = "samples/wallpapers/waifu"

[slow.eDP-1.transition]
type = "crossfade"
duration_ms = 4000
fps = 24

# Profile 7: No transitions (disabled)
[no-transition.eDP-1]
duration = 10
path = "samples/wallpapers/waifu"
transitions_enabled = false

# Transition config exists but is disabled by the toggle above
[no-transition.eDP-1.transition]
type = "slide"
duration_ms = 2000
fps = 60

[no-transition.eDP-1.transition.slide]
direction = "left-to-right"
